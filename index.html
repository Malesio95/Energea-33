<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Nodo Sicurezza Energea 33</title>

<style>
body {
    background-color: black;
    color: #00ff9c;
    font-family: monospace;
    text-align: center;
    padding-top: 100px;
}
input, button {
    padding: 10px;
    font-size: 16px;
}
</style>
</head>

<body>
   
<h1>NODO DI CONTENIMENTO DATI</h1>
<p>Protocollo: <span style="color:red;">ATTIVO</span></p>

<h2>Tempo alla pubblicazione:</h2>
<div id="timer">24:00:00</div>

<br>

<input type="text" id="codice" placeholder="Inserisci codice">
<button onclick="verificaCodice()">INVIA</button>

<p id="messaggio"></p>

<script>
let SCAD = new Date("2026-04-21T18:27:00").getTime();

function aggiornaTimer() {
    const oraAdesso = new Date().getTime();
    const differenza = SCAD - oraAdesso;

    if (differenza <= 0) {
    document.getElementById("timer").innerText = "00:00:00";

    document.getElementById("schermataPubblicazione").style.display = "block";

    avviaPubblicazione();

    return;
}

    let ore = Math.floor(differenza / (1000 * 60 * 60));
    let minuti = Math.floor((differenza % (1000 * 60 * 60)) / (1000 * 60));
    let secondi = Math.floor((differenza % (1000 * 60)) / 1000);

    document.getElementById("timer").innerText =
        ore + ":" + minuti + ":" + secondi;
}

setInterval(aggiornaTimer, 1000);

function verificaCodice() {
    let codice = document.getElementById("codice").value;

   if (codice === "E33-7421") {

    // aggiunge 24 ore alla scadenza
    SCAD += 86399000;

    document.getElementById("messaggio").innerText =
        "✔ Codice accettato. Pubblicazione rinviata di 24 ore.";
    } else {
        document.getElementById("messaggio").innerText =
            "✖ Codice errato. Tentativo registrato.";
    }
}
    function avviaPubblicazione() {
    let barra = 0;

    let logTesti = [
         "Archivio_fiscale_2033.json → repubblica.it/politica/?ref=RIHD-M",
    "Database_sanitario_emilia.db → corriere.it/politica/",
    "Registro_transazioni_energea33.csv → ilsole24ore.com/sez/economia",
    "Comunicazioni_interne_nodo5.log → ansa.it/canale_tecnologia/",
    "Backup_server_portocorsini.enc → agi.it/politica/",
    "Report_ambientale_sicilia.pdf → greenpeace.org/italy/storia/",
    "Accounting_statements_energea.xlsx → bloomberg.com/latest",
    "Shipping_register_gela.dat → reuters.com/world/europe/",
    "Tracciamento_navale_ionio.geojson → marinetraffic.com/en/ais/home/centerx:-12.0/centery:25.0/zoom:4",
    "Log_accessi_sistema_centrale.txt → wired.it/scienza/",
    "Dossier_estrazione_terre_rare.pdf → nationalgeographic.it/ambiente",
    "Confidencial_communications_ministry.msg → politico.eu/latest/",
    "Backup_cloud_nodo7.tar → dropbox.com/it/mers55/v=xWuViV4QKVA",
    "Pacchetto_dati_confidenziali.zip → mega.nz/folders/1rINJK1OUTJBJmTYz8jKKpyXMy1KTJPBJ",
    "Tracce_gps_scarichi_illegali.kml → openstreetmap.org/traces",
    "Registro_email_dirigenza.eml → mase.gov.it/portale/web/guest/amministrazione-ambientale-marittima",
    "Dati_monitoraggio_marino.csv → oceanographicmagazine.com/product-category/events/",
    "Archivio_video_sorveglianza.mp4 → youtube.com/watch?v=y_EztdiqDz4",
    "Financial_report_E33.xls → ft.com/italy",
    "Protocollo_sicurezza_interno.sec → euronews.com/ultime-notizie"
    ];

    let i = 0;

    let intervallo = setInterval(() => {

        if (barra >= 100) {
            clearInterval(intervallo);
            document.getElementById("logDati").innerHTML += "<br><br>✔ PUBBLICAZIONE COMPLETATA";
            return;
        }

        barra += 2;
        document.getElementById("barra").style.width = barra + "%";

        let log = document.getElementById("logDati");

if (i < logTesti.length) {

    let nuovaRiga = document.createElement("div");
    nuovaRiga.innerText = "> " + logTesti[i];

    log.appendChild(nuovaRiga);

    // auto-scroll verso il basso
    log.scrollTop = log.scrollHeight;

    i++;
}

    }, 180);
}
</script>

</body>
    <div id="schermataPubblicazione" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:#00ff9c; font-family:monospace; text-align:center; padding-top:80px;">

<h1>PUBBLICAZIONE DATI IN CORSO</h1>

<p>Server centrale: ATTIVO</p>

<div style="border:1px solid #00ff9c; width:60%; margin:auto; height:20px;">
    <div id="barra" style="height:100%; width:0%; background:#00ff9c;"></div>
</div>

<br>

<div id="logDati" style="
    width: 70%;
    margin: auto;
    height: 200px;
    overflow-y: auto;
    text-align: left;
    border: 1px solid #00ff9c;
    padding: 10px;
    font-size: 14px;
"></div>

</div>
</html>
