<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Nodo Sicurezza Energea 33</title>

<style>
body {
    background-color: black;
    color: #00ff9c;
    font-family: monospace;
    text-align: center;
    padding-top: 100px;
}
input, button {
    padding: 10px;
    font-size: 16px;
}
</style>
</head>

<body>
    <div id="schermataPubblicazione" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:#00ff9c; font-family:monospace; text-align:center; padding-top:80px;">

<h1>PUBBLICAZIONE DATI IN CORSO</h1>

<p>Server centrale: ATTIVO</p>

<div style="border:1px solid #00ff9c; width:60%; margin:auto; height:20px;">
    <div id="barra" style="height:100%; width:0%; background:#00ff9c;"></div>
</div>

<br>

<div id="logDati"></div>

</div>

<h1>NODO DI CONTENIMENTO DATI</h1>
<p>Protocollo: <span style="color:red;">ATTIVO</span></p>

<h2>Tempo alla pubblicazione:</h2>
<div id="timer">24:00:00</div>

<br>

<input type="text" id="codice" placeholder="Inserisci codice">
<button onclick="verificaCodice()">INVIA</button>

<p id="messaggio"></p>

<script>
let scadenza = new Date("2026-04-16T11:43:00").getTime();

function aggiornaTimer() {
    const oraAdesso = new Date().getTime();
    const differenza = scadenza - oraAdesso;

    if (differenza <= 0) {
    document.getElementById("timer").innerText = "00:00:00";

    document.getElementById("schermataPubblicazione").style.display = "block";

    avviaPubblicazione();

    return;
}

    let ore = Math.floor(differenza / (1000 * 60 * 60));
    let minuti = Math.floor((differenza % (1000 * 60 * 60)) / (1000 * 60));
    let secondi = Math.floor((differenza % (1000 * 60)) / 1000);

    document.getElementById("timer").innerText =
        ore + ":" + minuti + ":" + secondi;
}

setInterval(aggiornaTimer, 1000);

function verificaCodice() {
    let codice = document.getElementById("codice").value;

   if (codice === "E33-7421") {

    // aggiunge 24 ore alla scadenza
    scadenza = scadenza + (24 * 60 * 60 * 1000);

    document.getElementById("messaggio").innerText =
        "✔ Codice accettato. Pubblicazione rinviata di 24 ore.";
    } else {
        document.getElementById("messaggio").innerText =
            "✖ Codice errato. Tentativo registrato.";
    }
}
    function avviaPubblicazione() {
    let barra = 0;

    let logTesti = [
        "Archivio fiscale_2033.json → LaRepubblica.it",
        "Database sanitario_emilia.db → LaRepubblica.it",
        "Registro transazioni_energea33.csv → LaRepubblica.it",
        "Archivio comunicazioni_lorenzo.log → LaRepubblica.it",
        "Pacchetto sicurezza_nodo7.enc → LaRepubblica.it"
    ];

    let i = 0;

    let intervallo = setInterval(() => {

        if (barra >= 100) {
            clearInterval(intervallo);
            document.getElementById("logDati").innerHTML += "<br><br>✔ PUBBLICAZIONE COMPLETATA";
            return;
        }

        barra += 2;
        document.getElementById("barra").style.width = barra + "%";

        if (i < logTesti.length) {
            document.getElementById("logDati").innerHTML += "<br>" + logTesti[i];
            i++;
        }

    }, 200);
}
</script>

</body>
</html>
